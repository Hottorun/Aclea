<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: white; }
      .outlined { stroke: black; fill: none; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0a0a0a; }
      .outlined { stroke: white; fill: none; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <!-- Top-left: outlined square -->
  <rect class="outlined" x="22" y="22" width="72" height="72" stroke-width="8" />
  <!-- Bottom-right: solid accent square -->
  <rect x="98" y="98" width="60" height="60" fill="#5c3fff" />
</svg>
